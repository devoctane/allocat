<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "background-light": "#f7f7f7",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-slate-100 font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-dark group/design-root overflow-x-hidden">
<!-- Top Navigation -->
<div class="flex items-center bg-background-dark p-4 pb-2 justify-between">
<div class="text-slate-100 flex size-12 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</div>
<h2 class="text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1">Sign In</h2>
</div>
<!-- Header Content -->
<div class="max-w-[480px] w-full mx-auto px-4">
<h1 class="text-slate-100 tracking-tight text-[40px] font-bold leading-tight pb-3 pt-10">Welcome back</h1>
<p class="text-slate-400 text-base font-normal leading-normal pb-8 pt-1">Enter your details to access your account.</p>
<!-- Form Fields -->
<div class="flex flex-col gap-6">
<div class="flex flex-col gap-2">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-100 text-sm font-medium leading-normal pb-2">Email Address</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-100 focus:outline-0 focus:ring-1 focus:ring-slate-500 border border-slate-800 bg-slate-900/50 focus:border-slate-700 h-14 placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal" placeholder="name@example.com" type="email"/>
</label>
</div>
<div class="flex flex-col gap-2">
<label class="flex flex-col min-w-40 flex-1">
<div class="flex justify-between items-center pb-2">
<p class="text-slate-100 text-sm font-medium leading-normal">Password</p>
<a class="text-xs text-slate-400 hover:text-slate-100 transition-colors" href="#">Forgot password?</a>
</div>
<div class="flex w-full flex-1 items-stretch rounded-xl overflow-hidden border border-slate-800 focus-within:ring-1 focus-within:ring-slate-500 focus-within:border-slate-700">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden text-slate-100 focus:outline-0 focus:ring-0 border-0 bg-slate-900/50 h-14 placeholder:text-slate-500 p-[15px] pr-2 text-base font-normal leading-normal" placeholder="Enter your password" type="password"/>
<div class="text-slate-500 flex bg-slate-900/50 items-center justify-center pr-[15px] cursor-pointer hover:text-slate-100">
<span class="material-symbols-outlined text-[24px]">visibility</span>
</div>
</div>
</label>
</div>
<!-- Primary Action -->
<button class="mt-4 w-full h-14 bg-slate-100 text-black font-bold rounded-xl hover:bg-slate-200 transition-colors active:scale-[0.98]">
                    Sign In
                </button>
<!-- Divider -->
<div class="relative flex py-5 items-center">
<div class="flex-grow border-t border-slate-800"></div>
<span class="flex-shrink mx-4 text-slate-500 text-sm">or continue with</span>
<div class="flex-grow border-t border-slate-800"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-14 bg-transparent border border-slate-800 rounded-xl hover:bg-slate-900 transition-colors">
<span class="material-symbols-outlined text-[20px]">account_circle</span>
<span class="text-sm font-medium">Google</span>
</button>
<button class="flex items-center justify-center gap-2 h-14 bg-transparent border border-slate-800 rounded-xl hover:bg-slate-900 transition-colors">
<span class="material-symbols-outlined text-[20px]">terminal</span>
<span class="text-sm font-medium">GitHub</span>
</button>
</div>
<!-- Signup Link -->
<p class="text-center text-slate-400 text-sm mt-8">
                    Don't have an account? 
                    <a class="text-slate-100 font-bold hover:underline" href="#">Create account</a>
</p>
</div>
</div>
<div class="h-20 bg-background-dark"></div>
<!-- Decorative element -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-slate-800 to-transparent opacity-50"></div>
</div>
</body></html>
