<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#000000",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.75rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .tabular-nums { font-variant-numeric: tabular-nums; }
        /* Minimalist scrollbar */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-black font-display text-slate-100 antialiased">
<div class="relative flex h-screen w-full max-w-md mx-auto flex-col bg-black overflow-hidden border-x border-zinc-800">
<!-- Header -->
<header class="flex items-center justify-between px-6 pt-8 pb-4">
<button class="flex items-center justify-center size-10 rounded-full border border-zinc-800">
<span class="material-symbols-outlined text-xl">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Needs</h1>
<button class="flex items-center justify-center size-10">
<span class="material-symbols-outlined text-xl">more_vert</span>
</button>
</header>
<!-- Category Summary -->
<div class="px-6 py-4 grid grid-cols-3 gap-3">
<div class="flex flex-col gap-1 p-4 border border-zinc-800 rounded">
<span class="text-[10px] uppercase tracking-widest text-zinc-500 font-semibold">AlloCated</span>
<span class="text-base font-bold tabular-nums">1,200.00</span>
</div>
<div class="flex flex-col gap-1 p-4 border border-zinc-800 rounded">
<span class="text-[10px] uppercase tracking-widest text-zinc-500 font-semibold">Used</span>
<span class="text-base font-bold tabular-nums">850.00</span>
</div>
<div class="flex flex-col gap-1 p-4 border border-zinc-800 rounded bg-zinc-900">
<span class="text-[10px] uppercase tracking-widest text-zinc-400 font-semibold">Left</span>
<span class="text-base font-bold tabular-nums">350.00</span>
</div>
</div>
<!-- Section Label -->
<div class="px-6 pt-6 pb-2 flex justify-between items-end">
<h2 class="text-xs font-bold uppercase tracking-widest text-zinc-500">Items</h2>
<span class="text-[10px] text-zinc-500 tabular-nums">4 total</span>
</div>
<!-- Item List -->
<div class="flex-1 overflow-y-auto px-6 space-y-1">
<!-- Item Row -->
<div class="group flex items-center justify-between py-4 border-b border-zinc-900">
<div class="flex flex-col gap-0.5">
<input class="bg-transparent border-none p-0 text-sm font-medium focus:ring-0 w-32 text-zinc-100" type="text" value="Rent"/>
<span class="text-xs text-zinc-500 tabular-nums">Planned: 800.00</span>
</div>
<div class="text-right">
<input class="bg-transparent border-none p-0 text-sm font-bold text-right tabular-nums focus:ring-0 w-20 text-zinc-100" type="text" value="800.00"/>
</div>
</div>
<!-- Item Row -->
<div class="group flex items-center justify-between py-4 border-b border-zinc-900">
<div class="flex flex-col gap-0.5">
<input class="bg-transparent border-none p-0 text-sm font-medium focus:ring-0 w-32 text-zinc-100" type="text" value="Groceries"/>
<span class="text-xs text-zinc-500 tabular-nums">Planned: 300.00</span>
</div>
<div class="text-right">
<input class="bg-transparent border-none p-0 text-sm font-bold text-right tabular-nums focus:ring-0 w-20 text-zinc-100" type="text" value="50.00"/>
</div>
</div>
<!-- Item Row -->
<div class="group flex items-center justify-between py-4 border-b border-zinc-900">
<div class="flex flex-col gap-0.5">
<input class="bg-transparent border-none p-0 text-sm font-medium focus:ring-0 w-32 text-zinc-100" type="text" value="Utilities"/>
<span class="text-xs text-zinc-500 tabular-nums">Planned: 100.00</span>
</div>
<div class="text-right">
<input class="bg-transparent border-none p-0 text-sm font-bold text-right tabular-nums focus:ring-0 w-20 text-zinc-700" type="text" value="0.00"/>
</div>
</div>
<!-- Inline Add New Item Row -->
<div class="flex items-center justify-between py-4 border-b border-zinc-900">
<div class="flex flex-col gap-0.5">
<input class="bg-transparent border-none p-0 text-sm font-normal placeholder-zinc-700 focus:ring-0 w-32 text-zinc-100" placeholder="Add new item..." type="text"/>
</div>
<div class="text-right">
<button class="text-zinc-700 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-lg">add_circle</span>
</button>
</div>
</div>
</div>
<!-- Progress Bar -->
<div class="px-6 py-4">
<div class="w-full bg-zinc-900 h-1 rounded-full overflow-hidden">
<div class="bg-primary h-full" style="width: 71%"></div>
</div>
<div class="flex justify-between mt-2">
<span class="text-[10px] text-zinc-500 font-medium">71% spent</span>
<span class="text-[10px] text-zinc-500 tabular-nums">850.00 / 1,200.00</span>
</div>
</div>
<!-- Bottom Navigation -->
<nav class="flex border-t border-zinc-900 bg-black/80 backdrop-blur-md px-6 py-4 justify-between items-center">
<a class="text-zinc-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
</a>
<a class="text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">pie_chart</span>
</a>
<a class="text-zinc-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">format_list_bulleted</span>
</a>
<a class="text-zinc-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
</a>
</nav>
</div>
</body></html>
